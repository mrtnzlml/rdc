name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          # Pick `rdc.exe` on Windows, `rdc` otherwise.
          binary=rdc
          [ -f rdc.exe ] && binary=rdc.exe
          tar czf ../../../rdc-${{ matrix.target }}.tar.gz "$binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdc-${{ matrix.target }}
          path: rdc-${{ matrix.target }}.tar.gz
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    # Regenerates Formula/rdc.rb in mrtnzlml/homebrew-tap so `brew install
    # mrtnzlml/tap/rdc` resolves to this tag. Requires a repo secret
    # `HOMEBREW_TAP_TOKEN` -- a fine-grained PAT with contents:write on the
    # tap repo only.
    name: Bump Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: mrtnzlml/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/mrtnzlml/rdc/releases/download/${TAG}"
          sha_of() { curl -fsSL "$1" | sha256sum | awk '{ print $1 }'; }
          darwin_arm_sha=$(sha_of "$base/rdc-aarch64-apple-darwin.tar.gz")
          darwin_x86_sha=$(sha_of "$base/rdc-x86_64-apple-darwin.tar.gz")
          linux_x86_sha=$(sha_of "$base/rdc-x86_64-unknown-linux-gnu.tar.gz")

          mkdir -p tap/Formula
          cat > tap/Formula/rdc.rb <<RUBY
          class Rdc < Formula
            desc "Rossum Deployment as Code -- CLI for snapshotting and deploying Rossum.ai configurations"
            homepage "https://github.com/mrtnzlml/rdc"
            version "${version}"
            license "WTFPL"

            on_macos do
              on_arm do
                url "${base}/rdc-aarch64-apple-darwin.tar.gz"
                sha256 "${darwin_arm_sha}"
              end
              on_intel do
                url "${base}/rdc-x86_64-apple-darwin.tar.gz"
                sha256 "${darwin_x86_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/rdc-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_x86_sha}"
              end
            end

            def install
              bin.install "rdc"
              # rdc uses clap_complete's dynamic completions: COMPLETE=<shell> rdc
              # emits the registration script. :clap is Homebrew's predefined
              # format for exactly that protocol (bash/zsh/fish by default).
              generate_completions_from_executable(bin/"rdc", shell_parameter_format: :clap)
              # clap's zsh script only registers the completer (it is written for
              # \`source <(COMPLETE=zsh rdc)\`); autoloaded from fpath as _rdc, the
              # first TAB of a session would no-op. Invoke the completer too.
              (zsh_completion/"_rdc").append_lines "_clap_dynamic_completer_rdc"
            end

            test do
              assert_match "rdc", shell_output("#{bin}/rdc --version")
            end
          end
          RUBY

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rdc.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "rdc ${TAG}"
          git push
        env:
          TAG: ${{ github.ref_name }}
